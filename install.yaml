name: pimp-my-shell
project_files:
  - config.pimp-my-shell.yaml
  - commands/
  - homeadditions/
  - pimp-my-shell/
  - web-build/
post_install_actions:
  - |
    #ddev-description:Remove deprecated Dockerfile.~pimp-my-shell
    remove_file="web-build/Dockerfile.~pimp-my-shell"
    if [ -f "$remove_file" ]; then
      if grep -q '#ddev-generated' "$remove_file"; then
        rm "$remove_file"
      else
        echo "Existing "$remove_file" does not have #ddev-generated, so can't be removed"
      fi
    fi
  - |
    #ddev-description:Remove deprecated 1.24.4-Dockerfile.pimp-my-shell
    remove_file="web-build/1.24.4-Dockerfile.pimp-my-shell"
    if [ -f "$remove_file" ]; then
      if grep -q '#ddev-generated' "$remove_file"; then
        rm "$remove_file"
      else
        echo "Existing "$remove_file" does not have #ddev-generated, so can't be removed"
      fi
    fi
  - |
    #ddev-description:Remove deprecated 1.24.5-Dockerfile.pimp-my-shell
    remove_file="web-build/1.24.5-Dockerfile.~pimp-my-shell"
    if [ -f "$remove_file" ]; then
      if grep -q '#ddev-generated' "$remove_file"; then
        rm "$remove_file"
      else
        echo "Existing "$remove_file" does not have #ddev-generated, so can't be removed"
      fi
    fi
  - |
    #ddev-description:Remove deprecated .gitignore entries
    _file="${DDEV_APPROOT}/.ddev/web-build/.gitignore"
    if [ -f "$_file" ]; then
      _tmp_file=$(mktemp)
      grep -vx '#ddev-pimp-my-shell-ddev-v1.24.5' "$_file" | grep -vx '/Dockerfile.~pimp-my-shell' > "$_tmp_file" || true
      mv "$_tmp_file" "$_file"
      if ! grep -qvE '^($|#ddev-generated)$' "$_file"; then
        rm "$_file"
        echo "Removed empty/generated-only $_file"
      fi
    fi
